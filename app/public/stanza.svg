<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500" fill="none" role="img" aria-label="Claude Code doctor mascot">
  <title>Claude, MD</title>
  <defs>
    <path id="bot" d="M90,60 L120,60 L120,38 L180,38 L180,60 L420,60 L420,38 L480,38 L480,60 L510,60 L510,150 L540,150 L540,215 L510,215 L510,430 L426,430 L426,374 L398,374 L398,430 L314,430 L314,374 L286,374 L286,430 L202,430 L202,374 L174,374 L174,430 L90,430 L90,215 L60,215 L60,150 L90,150 Z"/>
    <clipPath id="botClip"><use href="#bot"/></clipPath>
  </defs>

  <!-- body + white sticker outline -->
  <use href="#bot" fill="#CE7357" stroke="#FFFFFF" stroke-width="26"
       paint-order="stroke" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- lab coat (clipped to body) -->
  <g clip-path="url(#botClip)">
    <rect x="80" y="238" width="440" height="140" fill="#FFFFFF"/>
    <!-- open collar V (clay chest shows) -->
    <polygon points="300,300 250,238 350,238" fill="#CE7357"/>
    <path d="M250,238 L300,300 L350,238" stroke="#E6E6E6" stroke-width="6" stroke-linejoin="round" fill="none"/>
    <!-- button placket -->
    <line x1="300" y1="300" x2="300" y2="372" stroke="#EAEAEA" stroke-width="3"/>
    <circle cx="300" cy="320" r="4" fill="#D6D6D6"/>
    <circle cx="300" cy="344" r="4" fill="#D6D6D6"/>
    <circle cx="300" cy="368" r="4" fill="#D6D6D6"/>
    <!-- breast pocket + molecule emblem -->
    <rect x="345" y="280" width="54" height="42" rx="4" stroke="#E4E4E4" stroke-width="3" fill="none"/>
    <polygon points="372,286 384.99,293.5 384.99,308.5 372,316 359.01,308.5 359.01,293.5"
             stroke="#CE7357" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <circle cx="372" cy="286" r="3.5" fill="#CE7357"/>
  </g>

  <!-- eyes: > < -->
  <g stroke="#161616" stroke-width="26" stroke-linecap="butt" stroke-linejoin="miter" fill="none">
    <polyline points="168,116 214,150 168,184"/>
    <polyline points="432,116 386,150 432,184"/>
  </g>
</svg>
