<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -30 240 220" width="100%" height="100%">
  <defs>
    <filter id="sticker" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="6" result="DILATED" />
      <feFlood flood-color="#ffffff" result="WHITE" />
      <feComposite in="WHITE" in2="DILATED" operator="in" result="OUTLINE" />
      <feDropShadow in="OUTLINE" dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3" result="SHADOW" />
      <feMerge>
        <feMergeNode in="SHADOW" />
        <feMergeNode in="OUTLINE" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

